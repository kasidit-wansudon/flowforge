apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowforge-server
  namespace: flowforge
  labels:
    app.kubernetes.io/name: flowforge-server
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: flowforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: flowforge-server
      app.kubernetes.io/component: server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flowforge-server
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: flowforge
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: flowforge-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: server
          image: ghcr.io/kasidit-wansudon/flowforge/server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
            - name: debug
              containerPort: 6060
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flowforge-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: flowforge-secrets
                  key: redis-url
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: flowforge-config
                  key: nats-url
            - name: FLOWFORGE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: flowforge-secrets
                  key: jwt-secret
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: flowforge-config
                  key: log-level
            - name: LOG_FORMAT
              value: json
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: flowforge-server
  namespace: flowforge
  labels:
    app.kubernetes.io/name: flowforge-server
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: flowforge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: flowforge-server
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: grpc
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flowforge-server
  namespace: flowforge
  labels:
    app.kubernetes.io/name: flowforge-server
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: flowforge
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flowforge-server
  namespace: flowforge
  labels:
    app.kubernetes.io/name: flowforge-server
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: flowforge
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - flowforge.example.com
      secretName: flowforge-tls
  rules:
    - host: flowforge.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flowforge-server
                port:
                  name: http
          - path: /api/v1/grpc
            pathType: Prefix
            backend:
              service:
                name: flowforge-server
                port:
                  name: grpc
