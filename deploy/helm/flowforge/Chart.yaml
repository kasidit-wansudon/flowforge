apiVersion: v2
name: flowforge
description: A distributed workflow orchestration engine with DAG-based execution
type: application
version: 0.1.0
appVersion: "1.0.0"
kubeVersion: ">=1.26.0-0"
home: https://github.com/kasidit-wansudon/flowforge
sources:
  - https://github.com/kasidit-wansudon/flowforge
maintainers:
  - name: FlowForge Team
    url: https://github.com/kasidit-wansudon/flowforge
keywords:
  - workflow
  - orchestration
  - dag
  - automation
  - ci-cd
  - etl
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: integration-delivery
dependencies:
  - name: postgresql
    version: "~15.5"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "~19.5"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: nats
    version: "~1.1"
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled
