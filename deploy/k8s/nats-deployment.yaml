apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowforge-nats
  namespace: flowforge
  labels:
    app.kubernetes.io/name: flowforge-nats
    app.kubernetes.io/component: messaging
    app.kubernetes.io/part-of: flowforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flowforge-nats
      app.kubernetes.io/component: messaging
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flowforge-nats
        app.kubernetes.io/component: messaging
        app.kubernetes.io/part-of: flowforge
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: nats
          image: nats:2.10-alpine
          imagePullPolicy: IfNotPresent
          args:
            - "--jetstream"
            - "--store_dir=/data"
            - "--max_payload=8MB"
            - "--http_port=8222"
            - "--name=flowforge-nats"
          ports:
            - name: client
              containerPort: 4222
              protocol: TCP
            - name: monitor
              containerPort: 8222
              protocol: TCP
            - name: cluster
              containerPort: 6222
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: nats-data
              mountPath: /data
      volumes:
        - name: nats-data
          emptyDir:
            sizeLimit: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: flowforge-nats
  namespace: flowforge
  labels:
    app.kubernetes.io/name: flowforge-nats
    app.kubernetes.io/component: messaging
    app.kubernetes.io/part-of: flowforge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: flowforge-nats
    app.kubernetes.io/component: messaging
  ports:
    - name: client
      port: 4222
      targetPort: client
      protocol: TCP
    - name: monitor
      port: 8222
      targetPort: monitor
      protocol: TCP
