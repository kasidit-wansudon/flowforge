apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowforge-worker
  namespace: flowforge
  labels:
    app.kubernetes.io/name: flowforge-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: flowforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: flowforge-worker
      app.kubernetes.io/component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flowforge-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: flowforge
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: flowforge-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: worker
          image: ghcr.io/kasidit-wansudon/flowforge/worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9091
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flowforge-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: flowforge-secrets
                  key: redis-url
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: flowforge-config
                  key: nats-url
            - name: FLOWFORGE_SERVER_GRPC_ADDR
              value: flowforge-server:9090
            - name: FLOWFORGE_WORKER_MAX_CONCURRENT
              valueFrom:
                configMapKeyRef:
                  name: flowforge-config
                  key: worker-max-concurrent
            - name: FLOWFORGE_WORKER_HEARTBEAT_INTERVAL
              value: "15s"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: flowforge-config
                  key: log-level
            - name: LOG_FORMAT
              value: json
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flowforge-worker
  namespace: flowforge
  labels:
    app.kubernetes.io/name: flowforge-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: flowforge
---
apiVersion: v1
kind: Service
metadata:
  name: flowforge-worker
  namespace: flowforge
  labels:
    app.kubernetes.io/name: flowforge-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: flowforge
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: flowforge-worker
    app.kubernetes.io/component: worker
  ports:
    - name: metrics
      port: 9091
      targetPort: metrics
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flowforge-worker
  namespace: flowforge
  labels:
    app.kubernetes.io/name: flowforge-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: flowforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flowforge-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120
      selectPolicy: Min
