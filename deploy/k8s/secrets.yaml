apiVersion: v1
kind: Secret
metadata:
  name: flowforge-secrets
  namespace: flowforge
  labels:
    app.kubernetes.io/name: flowforge
    app.kubernetes.io/part-of: flowforge
type: Opaque
# IMPORTANT: Replace these placeholder values before deploying.
# In production, use a secrets manager (e.g. Vault, AWS Secrets Manager,
# or sealed-secrets) rather than storing secrets in plain YAML.
stringData:
  # PostgreSQL credentials
  postgres-user: "flowforge"
  postgres-password: "CHANGE_ME_IN_PRODUCTION"

  # Full database connection URL
  database-url: "postgres://flowforge:CHANGE_ME_IN_PRODUCTION@flowforge-postgres:5432/flowforge?sslmode=require"

  # Redis connection URL
  redis-url: "redis://flowforge-redis:6379/0"

  # JWT signing secret for API authentication
  jwt-secret: "CHANGE_ME_TO_A_RANDOM_64_CHAR_STRING"

  # API encryption key
  encryption-key: "CHANGE_ME_TO_A_RANDOM_32_BYTE_HEX"
