{{- if .Values.podDisruptionBudget.server.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "flowforge.fullname" . }}-server
  labels:
    {{- include "flowforge.server.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.server.minAvailable }}
  selector:
    matchLabels:
      {{- include "flowforge.server.selectorLabels" . | nindent 6 }}
{{- end }}
---
{{- if .Values.podDisruptionBudget.worker.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "flowforge.fullname" . }}-worker
  labels:
    {{- include "flowforge.worker.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.worker.minAvailable }}
  selector:
    matchLabels:
      {{- include "flowforge.worker.selectorLabels" . | nindent 6 }}
{{- end }}
