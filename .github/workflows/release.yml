name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/flowforge

jobs:
  # ---------------------------------------------------------------------------
  # Validate tag
  # ---------------------------------------------------------------------------
  validate:
    name: Validate Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Run tests before release
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flowforge_test
          POSTGRES_USER: flowforge
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowforge -d flowforge_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://flowforge:testpassword@localhost:5432/flowforge_test?sslmode=disable
      REDIS_URL: redis://localhost:6379/0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run all tests
        run: go test -race -count=1 ./...

  # ---------------------------------------------------------------------------
  # Build and push multi-arch Docker images
  # ---------------------------------------------------------------------------
  docker:
    name: Docker (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [validate, test]
    strategy:
      matrix:
        target: [server, worker, cli]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.target }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:${{ needs.validate.outputs.version }}
          format: sarif
          output: trivy-${{ matrix.target }}.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.target }}.sarif

  # ---------------------------------------------------------------------------
  # Build release binaries
  # ---------------------------------------------------------------------------
  binaries:
    name: Binaries
    runs-on: ubuntu-latest
    needs: [validate, test]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${{ needs.validate.outputs.version }}
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GIT_COMMIT=${{ github.sha }}
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.buildTime=${BUILD_TIME} -X main.gitCommit=${GIT_COMMIT}"

          SUFFIX=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            SUFFIX=".exe"
          fi

          for cmd in server worker cli migrate; do
            go build -ldflags="${LDFLAGS}" \
              -o dist/flowforge-${cmd}-${{ matrix.goos }}-${{ matrix.goarch }}${SUFFIX} \
              ./cmd/${cmd}/
          done

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums-${{ matrix.goos }}-${{ matrix.goarch }}.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, docker, binaries]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Merge checksums
        run: |
          cd dist
          cat checksums-*.txt | sort > checksums.txt
          rm checksums-*.txt

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -50)
          fi

          # Write to file for the release body
          cat > release-notes.md << 'NOTES_EOF'
          ## What's Changed

          ${CHANGELOG}

          ## Docker Images

          ```bash
          # Server
          docker pull ${{ env.IMAGE_PREFIX }}-server:${{ needs.validate.outputs.version }}

          # Worker
          docker pull ${{ env.IMAGE_PREFIX }}-worker:${{ needs.validate.outputs.version }}

          # CLI
          docker pull ${{ env.IMAGE_PREFIX }}-cli:${{ needs.validate.outputs.version }}
          ```

          ## Helm Chart

          ```bash
          helm repo add flowforge https://github.com/${{ github.repository_owner }}/flowforge/releases/download/v${{ needs.validate.outputs.version }}/
          helm install flowforge flowforge/flowforge --version ${{ needs.validate.outputs.version }}
          ```

          ## Checksums

          See `checksums.txt` in the release assets for SHA256 checksums of all binaries.
          NOTES_EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FlowForge v${{ needs.validate.outputs.version }}
          body_path: release-notes.md
          prerelease: ${{ needs.validate.outputs.prerelease == 'true' }}
          draft: false
          files: |
            dist/flowforge-*
            dist/checksums.txt
          generate_release_notes: true

  # ---------------------------------------------------------------------------
  # Publish Helm Chart
  # ---------------------------------------------------------------------------
  helm:
    name: Helm Chart
    runs-on: ubuntu-latest
    needs: [validate, release]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Update chart version
        run: |
          VERSION=${{ needs.validate.outputs.version }}
          sed -i "s/^version:.*/version: ${VERSION}/" deploy/helm/flowforge/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/helm/flowforge/Chart.yaml

      - name: Package chart
        run: |
          helm dependency update deploy/helm/flowforge/
          helm package deploy/helm/flowforge/ -d .helm-packages/

      - name: Upload chart to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHART_PACKAGE=$(ls .helm-packages/*.tgz)
          gh release upload v${{ needs.validate.outputs.version }} "${CHART_PACKAGE}"

  # ---------------------------------------------------------------------------
  # Publish Python SDK
  # ---------------------------------------------------------------------------
  python-publish:
    name: Publish Python SDK
    runs-on: ubuntu-latest
    needs: [validate, test]
    if: needs.validate.outputs.prerelease == 'false'
    environment: pypi
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Update version
        run: |
          VERSION=${{ needs.validate.outputs.version }}
          sed -i "s/__version__ = .*/__version__ = \"${VERSION}\"/" sdk/python/flowforge/__init__.py
          sed -i "s/version=.*/version=\"${VERSION}\",/" sdk/python/setup.py

      - name: Build package
        run: |
          cd sdk/python
          python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          cd sdk/python
          twine upload dist/*
