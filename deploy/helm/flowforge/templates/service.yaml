apiVersion: v1
kind: Service
metadata:
  name: {{ include "flowforge.fullname" . }}-server
  labels:
    {{- include "flowforge.server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "flowforge.server.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "flowforge.fullname" . }}-worker
  labels:
    {{- include "flowforge.worker.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "flowforge.worker.selectorLabels" . | nindent 4 }}
  ports:
    - name: health
      port: 8081
      targetPort: 8081
      protocol: TCP
